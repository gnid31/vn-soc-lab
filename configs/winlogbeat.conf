# /etc/logstash/conf.d/winlogbeat.conf
# Logstash pipeline: nhận Winlogbeat (Windows Event Log + Sysmon) -> Elasticsearch

input {
  beats {
    port => 5044
  }
}

filter {
  # Chỉ xử lý event đến từ Winlogbeat
  if [agent][type] == "winlogbeat" or [@metadata][beat] == "winlogbeat" {

    # Chuẩn hoá timestamp: ưu tiên thời gian event Windows tạo
    if [winlog][time_created] {
      date {
        match => ["[winlog][time_created]", "ISO8601"]
        target => "@timestamp"
      }
    }

    # Tag theo provider
    if [winlog][provider_name] {
      mutate { add_field => { "[event][provider]" => "%{[winlog][provider_name]}" } }
    }

    # ---- Sysmon (Microsoft-Windows-Sysmon) ----
    if [winlog][provider_name] == "Microsoft-Windows-Sysmon" {
      mutate { add_tag => ["sysmon"] }

      # Map event_id -> mô tả ngắn cho dễ truy vấn
      translate {
        source      => "[winlog][event_id]"
        target      => "[event][action]"
        fallback    => "sysmon_event_%{[winlog][event_id]}"
        dictionary  => {
          "1"  => "process_creation"
          "2"  => "file_creation_time_changed"
          "3"  => "network_connection"
          "4"  => "sysmon_service_state_changed"
          "5"  => "process_terminated"
          "6"  => "driver_loaded"
          "7"  => "image_loaded"
          "8"  => "create_remote_thread"
          "9"  => "raw_access_read"
          "10" => "process_access"
          "11" => "file_create"
          "12" => "registry_object_create_delete"
          "13" => "registry_value_set"
          "14" => "registry_key_value_rename"
          "15" => "file_create_stream_hash"
          "16" => "sysmon_config_state_changed"
          "17" => "pipe_event_created"
          "18" => "pipe_event_connected"
          "19" => "wmi_event_filter"
          "20" => "wmi_event_consumer"
          "21" => "wmi_event_consumer_to_filter"
          "22" => "dns_query"
          "23" => "file_delete_archived"
          "24" => "clipboard_changed"
          "25" => "process_tampering"
          "26" => "file_delete_logged"
          "27" => "file_block_executable"
          "28" => "file_block_shredding"
          "29" => "file_executable_detected"
        }
      }
      mutate { add_field => { "[event][category]" => "sysmon" } }
    }

    # ---- Security channel (4624 login, 4625 failed, 4688 process, v.v.) ----
    else if [winlog][channel] == "Security" {
      mutate { add_tag => ["security"] }

      translate {
        source     => "[winlog][event_id]"
        target     => "[event][action]"
        fallback   => "security_event_%{[winlog][event_id]}"
        dictionary => {
          "4624" => "logon_success"
          "4625" => "logon_failed"
          "4634" => "logoff"
          "4648" => "logon_explicit_credentials"
          "4672" => "special_privileges_assigned"
          "4688" => "process_created"
          "4689" => "process_exited"
          "4720" => "user_account_created"
          "4724" => "password_reset_attempt"
          "4728" => "user_added_to_global_group"
          "4732" => "user_added_to_local_group"
          "4740" => "user_account_locked"
          "5140" => "network_share_accessed"
          "5145" => "network_share_object_checked"
        }
      }
      mutate { add_field => { "[event][category]" => "authentication" } }
    }

    # ---- System / Application / PowerShell channels ----
    else if [winlog][channel] in ["System", "Application"] {
      mutate { add_tag => ["windows_event_log"] }
    }
    else if [winlog][channel] =~ /(?i)powershell/ {
      mutate { add_tag => ["powershell"] }
      mutate { add_field => { "[event][category]" => "process" } }
    }

    # Trường tiện ích cho truy vấn nhanh
    if [host][name] {
      mutate { add_field => { "[host][hostname]" => "%{[host][name]}" } }
    }
  }
}

output {
  if [@metadata][beat] == "winlogbeat" or [agent][type] == "winlogbeat" {
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "<ELASTIC_PASSWORD>"
      ssl_enabled      => true
      ssl_verification_mode => "none"
      # Index theo ngày: winlogbeat-YYYY.MM.dd
      index            => "winlogbeat-%{+YYYY.MM.dd}"
      action           => "create"
    }
  } else {
    # Fallback: bất kỳ event nào không phải winlogbeat vẫn được lưu để debug
    elasticsearch {
      hosts            => ["https://localhost:9200"]
      user             => "elastic"
      password         => "<ELASTIC_PASSWORD>"
      ssl_enabled      => true
      ssl_verification_mode => "none"
      index            => "logstash-%{+YYYY.MM.dd}"
    }
  }
}
