input {
  beats { port => 5044 }
  # Pha 12 #2 — syslog receiver cho Linux hosts + network device
  syslog {
    port => 5140
    codec => "plain"
    type => "syslog"
  }
  # Pha 12 #2 — TCP JSON input cho Docker container logs / custom app
  tcp {
    port => 5145
    codec => "json_lines"
    type => "docker"
  }
}

filter {
  if [agent][type] == "winlogbeat" or [@metadata][beat] == "winlogbeat" {
    if [winlog][time_created] {
      date { match => ["[winlog][time_created]", "ISO8601"] target => "@timestamp" }
    }
    # Pha 10.1 fix: KHÔNG add_field event.provider vì Winlogbeat đã ship sẵn.
    # Cũ: mutate { add_field => { "[event][provider]" => "%{[winlog][provider_name]}" } }
    # → tạo Array duplicate ["Microsoft-Windows-Sysmon", "Microsoft-Windows-Sysmon"]
    if [winlog][provider_name] == "Microsoft-Windows-Sysmon" {
      mutate { add_tag => ["sysmon"] }
      translate {
        source => "[winlog][event_id]"
        target => "[event][action]"
        fallback => "sysmon_event_%{[winlog][event_id]}"
        dictionary => {
          "1" => "process_creation"
          "3" => "network_connection"
          "10" => "process_access"
          "11" => "file_create"
          "13" => "registry_value_set"
          "22" => "dns_query"
        }
      }
      mutate { add_field => { "[event][category]" => "sysmon" } }
    }
    else if [winlog][channel] == "Security" {
      mutate { add_tag => ["security"] }
      translate {
        source => "[winlog][event_id]"
        target => "[event][action]"
        fallback => "security_event_%{[winlog][event_id]}"
        dictionary => {
          "4624" => "logon_success"
          "4625" => "logon_failed"
          "4688" => "process_created"
          "4720" => "user_account_created"
        }
      }
      mutate { add_field => { "[event][category]" => "authentication" } }
    }
    else if [winlog][channel] in ["System", "Application"] {
      mutate { add_tag => ["windows_event_log"] }
    }
    else if [winlog][channel] =~ /(?i)powershell/ {
      mutate { add_tag => ["powershell"] }
      mutate { add_field => { "[event][category]" => "process" } }
    }
    if [host][name] {
      mutate { add_field => { "[host][hostname]" => "%{[host][name]}" } }
    }
  }

  if [@metadata][beat] == "filebeat" {
    if [fields][source_type] == "vnsoc-yara" {
      # Pha 14 A — YARA scanner NDJSON
      mutate { add_tag => ["yara", "malware-scan"] }
    }
    else if [fields][source_type] == "cowrie-honeypot" {
      # Pha 14 C — Cowrie SSH honeypot events
      mutate { add_tag => ["cowrie", "honeypot"] }
      mutate { add_field => { "[event][category]" => "authentication" } }
      mutate { add_field => { "[event][module]" => "cowrie" } }
    }
    else if [fields][source_type] == "vnsoc-ueba" {
      # Pha 14 E — UEBA baseline anomaly check results
      mutate { add_tag => ["ueba", "vnsoc-lab"] }
      mutate { add_field => { "[event][category]" => "authentication" } }
      mutate { add_field => { "[event][module]" => "vnsoc-ueba" } }
    }
    else if [fields][source_type] == "zeek" {
      # Pha 14 D — Zeek NIDS flow metadata + protocol analysis
      mutate { add_tag => ["zeek", "nids", "network"] }
      mutate { add_field => { "[event][category]" => "network" } }
      mutate { add_field => { "[event][module]" => "zeek" } }
    }
    else if [fields][source_type] == "vnsoc-vuln" {
      # Pha 15 — Vulnerability scanner results (Trivy + Nikto)
      mutate { add_tag => ["vuln", "vulnerability", "scan"] }
      mutate { add_field => { "[event][category]" => "vulnerability" } }
    }
    else if [fields][source_type] == "wazuh-alerts" {
      # Pha 13 — Wazuh Manager alerts ship qua Filebeat SOC-Wazuh
      mutate { add_tag => ["wazuh", "hids"] }
      mutate { add_field => { "[event][category]" => "endpoint" } }
      mutate { add_field => { "[event][module]" => "wazuh" } }
      # Wazuh alerts.json đã có structured JSON — parse rồi
      if [rule][groups] {
        # Tag by rule group cho dashboard filter
        ruby {
          code => 'event.get("[rule][groups]").each { |g| event.tag(g) } if event.get("[rule][groups]").is_a?(Array)'
        }
      }
    }
    else if [fields][source_type] == "suricata" {
      mutate { add_tag => ["suricata", "nids"] }
      mutate { add_field => { "[event][category]" => "network" } }
      mutate { add_field => { "[event][module]" => "suricata" } }
      if [event_type] {
        mutate { add_field => { "[event][action]" => "%{event_type}" } }
      }

      # Pha 11 B1 — GeoIP enrichment on external src IP
      if [src_ip] and [src_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.)/ {
        geoip {
          source => "src_ip"
          target => "[source][geo]"
          fields => ["country_name", "country_code2", "city_name", "region_name", "location", "timezone"]
        }
        geoip {
          source => "src_ip"
          target => "[source][as]"
          default_database_type => "ASN"
          fields => ["AUTONOMOUS_SYSTEM_NUMBER", "AUTONOMOUS_SYSTEM_ORGANIZATION"]
        }
      }
      if [dest_ip] and [dest_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.)/ {
        geoip {
          source => "dest_ip"
          target => "[destination][geo]"
          fields => ["country_name", "country_code2", "city_name", "location"]
        }
      }
    }
    else if [fields][source_type] == "dvwa-apache" {
      mutate { add_tag => ["dvwa", "web", "apache"] }
      grok {
        match => { "message" => "%{COMBINEDAPACHELOG}" }
        tag_on_failure => ["_grokparsefailure_apache"]
      }
      mutate { add_field => { "[event][category]" => "web" } }
      mutate { add_field => { "[event][module]" => "dvwa" } }

      # Pha 11 B1 — GeoIP src address
      if [source][address] and [source][address] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.)/ {
        geoip {
          source => "[source][address]"
          target => "[source][geo]"
          fields => ["country_name", "country_code2", "city_name", "location", "timezone"]
        }
        geoip {
          source => "[source][address]"
          target => "[source][as]"
          default_database_type => "ASN"
          fields => ["AUTONOMOUS_SYSTEM_NUMBER", "AUTONOMOUS_SYSTEM_ORGANIZATION"]
        }
      }

      # Pha 11 B2 — Parse User-Agent
      if [user_agent][original] {
        useragent {
          source => "[user_agent][original]"
          target => "[user_agent]"
        }
      }

      # Pha 11 B4 — Fingerprint for dedup (same src+url within index-day = same _id)
      if [source][address] and [url][original] {
        fingerprint {
          source => ["[source][address]", "[url][original]", "[http][request][method]"]
          target => "[event][hash]"
          method => "SHA256"
          concatenate_sources => true
        }
      }

      # Pha 11 B3 — IOC match (URLhaus recent malicious URL paths)
      if [url][original] {
        translate {
          source => "[url][original]"
          target => "[threat][indicator][provider]"
          dictionary_path => "/etc/logstash/ioc/urlhaus-paths.yml"
          refresh_interval => 3600
          fallback => ""
        }
        if [threat][indicator][provider] and [threat][indicator][provider] != "" {
          mutate {
            add_tag => ["ioc_match", "urlhaus"]
            add_field => { "[threat][indicator][type]" => "url" }
            add_field => { "[threat][indicator][marking][tlp]" => "white" }
          }
        } else {
          mutate { remove_field => ["[threat][indicator][provider]"] }
        }
      }

      # Pha 8 — ML enrichment: call Flask URL classifier
      if [url][original] {
        http {
          url => "http://127.0.0.1:5000/predict"
          verb => "POST"
          body_format => "json"
          body => { "url" => "%{[url][original]}" }
          target_body => "[ml]"
          connect_timeout => 2
          socket_timeout => 5
          tag_on_request_failure => ["_ml_api_failure"]
        }
      }
    }
  }

  # Pha 12 #2 — syslog input handling
  if [type] == "syslog" {
    mutate { add_tag => ["syslog"] }
    mutate { add_field => { "[event][category]" => "host" } }
    mutate { add_field => { "[event][module]" => "syslog" } }
    # syslog input auto-populates: [host][hostname], severity, facility, program, message
  }

  # Pha 12 #2 — Docker JSON logs handling
  if [type] == "docker" {
    mutate { add_tag => ["docker", "container"] }
    mutate { add_field => { "[event][category]" => "container" } }
    mutate { add_field => { "[event][module]" => "docker" } }
  }
}

output {
  if [@metadata][beat] == "winlogbeat" or [agent][type] == "winlogbeat" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "winlogbeat-%{+YYYY.MM.dd}"
      action => "create"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "suricata" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "suricata-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "wazuh-alerts" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "wazuh-alerts-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "vnsoc-yara" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "yara-scan-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "cowrie-honeypot" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "cowrie-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "vnsoc-ueba" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "ueba-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "zeek" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "zeek-%{[fields][zeek_log]}-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "vnsoc-vuln" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "vuln-scan-%{+YYYY.MM.dd}"
    }
  }
  else if [@metadata][beat] == "filebeat" and [fields][source_type] == "dvwa-apache" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "dvwa-apache-%{+YYYY.MM.dd}"
    }
  }
  else if [type] == "syslog" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "syslog-%{+YYYY.MM.dd}"
    }
  }
  else if [type] == "docker" {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "docker-%{+YYYY.MM.dd}"
    }
  }
  else {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "<ELASTIC_PASSWORD>"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "logstash-%{+YYYY.MM.dd}"
    }
  }
}
