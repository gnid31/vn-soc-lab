## Cortex 3 application configuration (VN-SOC Lab)

play.http.secret.key = "${PLAY_SECRET}"

search {
  index = cortex
  uri = "http://cortex-elasticsearch:9200/"
  keepalive = 1m
  pagesize = 50
  nbshards = 1
  nbreplicas = 0
  settings {
    mapping.nested_fields.limit = 100
  }
}

## Authentication: local DB only (lab)
auth {
  provider = [local]
  multifactor = []
}

## Analyzer + responder definitions
analyzer {
  urls = [
    "https://download.thehive-project.org/analyzers.json"
  ]
  fork-join-executor {
    parallelism-min = 2
    parallelism-max = 4
  }
}

responder {
  urls = [
    "https://download.thehive-project.org/responders.json"
  ]
  fork-join-executor {
    parallelism-min = 2
    parallelism-max = 4
  }
}

## Job runners — use Docker socket (mounted from host)
job {
  runners = [docker]
}
