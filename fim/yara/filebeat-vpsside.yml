## Filebeat trên VPS host — tail YARA scan.ndjson → Logstash local
## Deploy: /etc/filebeat/filebeat.yml (overwrite mặc định)

filebeat.inputs:
  - type: filestream
    id: vnsoc-yara-scan
    enabled: true
    paths:
      - /var/log/vnsoc-yara/scan.ndjson
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      source_type: vnsoc-yara
    fields_under_root: false

  - type: filestream
    id: cowrie-honeypot
    enabled: true
    paths:
      - /var/lib/docker/volumes/cowrie_cowrie_logs/_data/cowrie.json*
    parsers:
      - ndjson: { keys_under_root: true, add_error_key: true }
    fields: { source_type: cowrie-honeypot }
    fields_under_root: false

  - type: filestream
    id: vnsoc-ueba
    enabled: true
    paths:
      - /var/log/vnsoc-ueba/anomalies.ndjson
    parsers:
      - ndjson: { keys_under_root: true, add_error_key: true }
    fields: { source_type: vnsoc-ueba }
    fields_under_root: false

  - type: filestream
    id: vnsoc-vuln
    enabled: true
    paths:
      - /var/log/vnsoc-vuln/trivy-*.ndjson
      - /var/log/vnsoc-vuln/nikto-*.ndjson
    parsers:
      - ndjson: { keys_under_root: true, add_error_key: true }
    fields: { source_type: vnsoc-vuln }
    fields_under_root: false

  # Pha 15.1 — Docker container logs qua log-json driver default
  # Filebeat autodiscover mode: watch Docker events + tail /var/lib/docker/containers/*/*-json.log per container
  - type: container
    id: docker-containers
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    stream: all
    fields:
      source_type: docker-containers
    fields_under_root: false

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
      match_fields: []
      match_pids: []
      match_source: true
      match_source_index: 4  # /var/lib/docker/containers/<CONTAINER_ID>/... — index 4 = container ID
      cleanup_timeout: 60

output.logstash:
  hosts: ["127.0.0.1:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 5
